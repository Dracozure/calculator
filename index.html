<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Calculator</title>
        <link rel="stylesheet" href="./style.css">
        <script src="./script.js"></script>
    </head>

    <body>
        <div class="calculator">
            <div class="row row1">
                <button class="operator all-clear" id="all-clear">AC</button>
                <button class="operator plus-minus" id="plus-minus">⁺/₋</button>
                <button class="operator percent" id="percent">%</button>
                <button class="operator math" id="divide">÷</button>
            </div>
            <div class="row row2">
                <button class="number" id="seven">7</button>
                <button class="number" id="eight">8</button>
                <button class="number" id="nine">9</button>
                <button class="operator math" id="multiply">×</button>
            </div>
            <div class="row row3">
                <button class="number" id="four">4</button>
                <button class="number" id="five">5</button>
                <button class="number" id="six">6</button>
                <button class="operator math" id="minus">−</button>
            </div>
            <div class="row row4">
                <button class="number" id="one">1</button>
                <button class="number" id="two">2</button>
                <button class="number" id="three">3</button>
                <button class="operator math" id="plus">+</button>
            </div>
            <div class="row row5">
                <button class="number" id="zero">0</button>
                <button class="operator decimal" id="decimal">.</button>
                <button class="operator math" id="equal">=</button>
            </div>
        </div>
    </body>
</html>
